{% extends "base.html" %}

{% block title %}Semantic Search{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Semantic Search</h4>
            </div>
            <div class="card-body">
                <form id="searchForm">
                    <div class="mb-3">
                        <label for="dataset" class="form-label">Select Dataset</label>
                        <select class="form-select" id="dataset" name="dataset_id" required>
                            <option value="">Choose a dataset</option>
                            {% for dataset in datasets %}
                            <option value="{{ dataset.id }}">{{ dataset.name }} ({{ dataset.domain }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="query" class="form-label">Search Query</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="query" name="query" 
                                   placeholder="e.g., Einstein's theory of relativity" required>
                            <button class="btn btn-primary" type="submit">
                                <i class="bi bi-search"></i> Search
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Results Section -->
        <div id="results" class="mt-4" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Search Results</h5>
                </div>
                <div class="card-body">
                    <div id="entitiesResults"></div>
                    <div id="relationsResults" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('searchForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const datasetId = document.getElementById('dataset').value;
        const query = document.getElementById('query').value;
        
        if (!datasetId || !query) {
            alert('Please select a dataset and enter a query');
            return;
        }
        
        // Show loading
        document.getElementById('results').style.display = 'block';
        document.getElementById('entitiesResults').innerHTML = '<p class="text-muted">Searching...</p>';
        document.getElementById('relationsResults').innerHTML = '';
        
        // Make search request
        fetch('/search', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({
                'dataset_id': datasetId,
                'query': query
            })
        })
        .then(response => response.json())
        .then(data => {
            displayResults(data);
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('entitiesResults').innerHTML = '<p class="text-danger">Error performing search</p>';
        });
    });
    
    function displayResults(data) {
        let html = '';
        
        // Display entities
        if (data.entities && data.entities.length > 0) {
            html += '<h6>Related Entities:</h6><div class="list-group mb-3">';
            data.entities.forEach(item => {
                html += `
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong>${item.entity.name}</strong>
                                <span class="badge bg-info">${item.entity.type}</span>
                            </div>
                            <span class="badge bg-success">${(item.score * 100).toFixed(1)}% match</span>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
        }
        
        document.getElementById('entitiesResults').innerHTML = html;
        
        // Display relations
        html = '';
        if (data.relations && data.relations.length > 0) {
            html += '<h6>Related Relations:</h6><div class="list-group">';
            data.relations.forEach(item => {
                html += `
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong>${item.relation.entity1}</strong> 
                                <i class="bi bi-arrow-right"></i> 
                                <span class="badge bg-warning">${item.relation.type}</span>
                                <i class="bi bi-arrow-right"></i> 
                                <strong>${item.relation.entity2}</strong>
                            </div>
                            <span class="badge bg-success">${(item.score * 100).toFixed(1)}% match</span>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
        }
        
        document.getElementById('relationsResults').innerHTML = html;
        
        if (!data.entities || !data.relations || (data.entities.length === 0 && data.relations.length === 0)) {
            document.getElementById('entitiesResults').innerHTML = '<p class="text-muted">No results found</p>';
        }
    }
</script>
{% endblock %}
